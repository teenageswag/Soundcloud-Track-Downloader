<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sound Downloader</title>
  <style>
    :root {
      --bg: #171717;
      --bg-el: #191919;
      --bg-hover: #1f1f1f;
      --bg-active: #252525;
      --bg-selected: #2a2510;
      --border: #262626;
      --border-var: #737373;
      --accent: #E0C952;
      --text: #CCCCCC;
      --text-muted: #999999;
      --text-dim: #737373;
      --success: #75BF40;
      --error: #CC3333;
      --scrollbar: #73737366;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scrollbar-color: var(--scrollbar) transparent;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.45;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    .page {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
    }

    .title {
      margin: 0 0 20px;
      color: var(--text);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.35;
    }

    .section {
      background: var(--bg-el);
      border-radius: 10px;
      padding: 16px;
      margin: 0 0 20px;
    }

    .form {
      display: grid;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 12px;
      background: var(--bg-el);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font: 400 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    textarea::placeholder {
      color: var(--text-dim);
    }

    textarea:focus,
    input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .primary {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #171717;
      font: 500 15px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    .primary:hover {
      filter: brightness(1.1);
    }

    .primary:disabled {
      cursor: default;
      filter: none;
      opacity: 0.7;
    }

    .caption {
      margin: 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
    }

    .progress-list {
      display: grid;
      gap: 8px;
    }

    .progress-item {
      display: flex;
      align-items: center;
      min-height: 24px;
      color: var(--text-dim);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .progress-item.downloading {
      color: var(--accent);
    }

    .progress-item.done {
      color: var(--success);
    }

    .progress-item.error {
      color: var(--error);
    }

    .spinner {
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid var(--bg-active);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tracks {
      display: grid;
      gap: 0;
    }

    .track {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 44px;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--bg-el);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: append 180ms ease-out;
    }

    .track:hover {
      background: var(--bg-hover);
      border-color: var(--border-var);
    }

    .track + .track {
      margin-top: 8px;
      position: relative;
    }

    .track + .track::before {
      content: "";
      position: absolute;
      left: 72px;
      right: 12px;
      top: -5px;
      height: 1px;
      background: var(--border);
    }

    @keyframes append {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .art {
      width: 48px;
      height: 48px;
      background: var(--bg-active);
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }

    .meta {
      min-width: 0;
    }

    .track-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-uploader {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-detail {
      margin-top: 3px;
      color: var(--text-dim);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete {
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: var(--error);
      cursor: pointer;
      opacity: 0.6;
      font: 400 18px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .delete:hover {
      opacity: 1;
    }

    .empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Sound Downloader</h1>

    <section class="section">
      <form class="form" id="downloadForm">
        <textarea id="urls" placeholder="Paste SoundCloud URLs, one per line"></textarea>
        <button class="primary" id="downloadButton" type="submit">↓ Download</button>
      </form>
    </section>

    <section class="section">
      <p class="caption">Progress</p>
      <div class="progress-list" id="progressList">
        <div class="empty">Waiting…</div>
      </div>
    </section>

    <section class="section">
      <p class="caption">Tracks</p>
      <div class="tracks" id="tracks">
        <div class="empty">No downloaded tracks</div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('downloadForm');
    const textarea = document.getElementById('urls');
    const button = document.getElementById('downloadButton');
    const progressList = document.getElementById('progressList');
    const tracksEl = document.getElementById('tracks');
    const progressByUrl = new Map();

    function text(value) {
      return String(value || '');
    }

    function truncate(value) {
      const clean = text(value).replace(/\s+/g, ' ').trim();
      return clean.length > 120 ? `${clean.slice(0, 117)}...` : clean;
    }

    function formatSize(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) {
        return '';
      }

      const mb = value / 1024 / 1024;
      return `${mb.toFixed(mb >= 10 ? 1 : 2)} MB`;
    }

    function clearEmpty(container, fallbackText) {
      const empty = container.querySelector('.empty');
      if (empty) {
        empty.remove();
      }

      if (!container.children.length && fallbackText) {
        const node = document.createElement('div');
        node.className = 'empty';
        node.textContent = fallbackText;
        container.appendChild(node);
      }
    }

    function setProgress(url, state, message) {
      clearEmpty(progressList);

      let item = progressByUrl.get(url);
      if (!item) {
        item = document.createElement('div');
        progressByUrl.set(url, item);
        progressList.appendChild(item);
      }

      item.className = `progress-item ${state}`;
      item.textContent = '';

      if (state === 'pending') {
        item.textContent = 'Waiting…';
      } else if (state === 'downloading') {
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        item.appendChild(spinner);
        item.appendChild(document.createTextNode('Downloading…'));
      } else if (state === 'done') {
        item.textContent = `✓ ${text(message)}`;
      } else if (state === 'error') {
        item.textContent = `✕ ${truncate(message)}`;
      }
    }

    async function loadTracks() {
      const response = await fetch('/tracks');
      const data = await response.json();
      tracksEl.textContent = '';

      if (!data.tracks || data.tracks.length === 0) {
        clearEmpty(tracksEl, 'No downloaded tracks');
        return;
      }

      for (const track of data.tracks) {
        const card = document.createElement('article');
        card.className = 'track';

        let art;
        if (track.artwork) {
          art = document.createElement('img');
          art.src = track.artwork;
          art.alt = '';
        } else {
          art = document.createElement('div');
        }
        art.className = 'art';

        const meta = document.createElement('div');
        meta.className = 'meta';

        const title = document.createElement('div');
        title.className = 'track-title';
        title.textContent = track.title || track.file;

        const uploader = document.createElement('div');
        uploader.className = 'track-uploader';
        uploader.textContent = track.uploader || 'Unknown uploader';

        const detail = document.createElement('div');
        detail.className = 'track-detail';
        const parts = [track.durationText, formatSize(track.size)].filter(Boolean);
        detail.textContent = parts.join(' · ');

        meta.append(title, uploader, detail);

        const del = document.createElement('button');
        del.className = 'delete';
        del.type = 'button';
        del.textContent = '✕';
        del.title = 'Delete';
        del.addEventListener('click', async () => {
          await fetch(`/tracks/${encodeURIComponent(track.file)}`, { method: 'DELETE' });
          await loadTracks();
        });

        card.append(art, meta, del);
        tracksEl.appendChild(card);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const urls = textarea.value.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!urls.length) {
        return;
      }

      button.disabled = true;
      urls.forEach((url) => setProgress(url, 'pending'));

      try {
        await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls })
        });
        textarea.value = '';
      } finally {
        button.disabled = false;
      }
    });

    const events = new EventSource('/events');
    events.onmessage = (message) => {
      const event = JSON.parse(message.data);
      if (!event.url) {
        return;
      }

      if (event.type === 'start' || event.type === 'progress') {
        setProgress(event.url, 'downloading', event.message);
      } else if (event.type === 'done') {
        setProgress(event.url, 'done', event.message);
        loadTracks();
      } else if (event.type === 'error') {
        setProgress(event.url, 'error', event.message);
      }
    };

    loadTracks();
  </script>
</body>
</html>
