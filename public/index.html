<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soundwave Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #171717;
      --surface: #191919;
      --border: #262626;
      --border-accent: #E0C952;
      --text: #CCCCCC;
      --text-muted: #999999;
      --text-dim: #737373;
      --accent: #E0C952;
      --green: #75BF40;
      --red: #CC3333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100vh;
      width: 100vw;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      overflow: hidden;
    }

    /* Scrollbars matching palette */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
      transition: background 0.2s;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Premium Text Selection */
    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    .app-container {
      height: 100vh;
      max-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    /* Core Dashboard Layout */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      min-height: 0;
      height: 100%;
    }

    /* Panels */
    .sidebar {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex: 0 0 auto;
    }

    .panel-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .panel-badge {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 8px;
      color: var(--text-muted);
    }

    /* Form Design */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-textarea {
      width: 100%;
      height: 100px;
      resize: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-textarea::placeholder {
      color: var(--text-dim);
    }

    .input-textarea:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: 0 0 0 2px rgba(224, 201, 82, 0.1);
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 38px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s, opacity 0.2s;
    }

    .btn-download:hover {
      filter: brightness(1.08);
    }

    .btn-download:active {
      transform: scale(0.99);
    }

    .btn-download:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .notice {
      font-size: 12px;
      color: var(--text-dim);
      min-height: 18px;
      transition: color 0.2s;
      margin-top: 4px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .notice.active {
      color: var(--accent);
    }

    /* Queue Panels */
    .queue-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 20px 0;
    }

    .empty-state svg {
      color: var(--border);
    }

    /* Queue Items */
    .queue-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      align-items: center;
      animation: slide-in 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .queue-details {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .queue-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .queue-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .queue-url {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .queue-status-tag {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Queue States */
    .queue-item.pending {
      border-left: 3px solid var(--text-dim);
    }
    .queue-item.pending .queue-status-tag {
      background: rgba(115, 115, 115, 0.08);
      color: var(--text-muted);
      border: 1px solid rgba(115, 115, 115, 0.15);
    }

    .queue-item.downloading {
      border-left: 3px solid var(--accent);
      background: rgba(224, 201, 82, 0.01);
    }
    .queue-item.downloading .queue-title {
      color: var(--accent);
    }
    .queue-item.downloading .queue-status-tag {
      background: rgba(224, 201, 82, 0.08);
      color: var(--accent);
      border: 1px solid rgba(224, 201, 82, 0.2);
      animation: pulse-border 1.5s infinite;
    }

    .queue-item.done,
    .queue-item.skipped {
      border-left: 3px solid var(--green);
    }
    .queue-item.done .queue-title,
    .queue-item.skipped .queue-title {
      color: var(--green);
    }
    .queue-item.done .queue-status-tag,
    .queue-item.skipped .queue-status-tag {
      background: rgba(117, 191, 64, 0.08);
      color: var(--green);
      border: 1px solid rgba(117, 191, 64, 0.15);
    }

    .queue-item.error {
      border-left: 3px solid var(--red);
    }
    .queue-item.error .queue-title {
      color: var(--red);
    }
    .queue-item.error .queue-status-tag {
      background: rgba(204, 51, 51, 0.08);
      color: var(--red);
      border: 1px solid rgba(204, 51, 51, 0.15);
    }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(224, 201, 82, 0.15); }
      50% { border-color: var(--accent); }
    }

    /* Track Library main area */
    .main-content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .search-input-wrapper {
      position: relative;
      width: 220px;
    }

    .search-input {
      width: 100%;
      height: 30px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px 0 28px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: 0 0 0 1px rgba(224, 201, 82, 0.05);
    }

    .search-input::placeholder {
      color: var(--text-dim);
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .tracks-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 2px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-content: start;
    }

    /* Premium Horizontal Track Item Card */
    .track-card {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s ease-out, background-color 0.2s ease-out, transform 0.2s ease-out;
      animation: slide-in 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .track-card:hover {
      background: rgba(224, 201, 82, 0.01);
      border-color: var(--border-accent);
      transform: translateX(1px);
    }

    .track-art-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      position: relative;
    }

    .track-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .track-art-placeholder {
      width: 20px;
      height: 20px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .track-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .track-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .track-uploader {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .track-meta-item {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .track-genre-pill {
      font-size: 9px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(224, 201, 82, 0.05);
      border: 1px solid rgba(224, 201, 82, 0.12);
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-delete {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-out;
    }

    .btn-delete:hover {
      color: var(--red);
      border-color: var(--red);
      background: rgba(204, 51, 51, 0.05);
      box-shadow: 0 0 8px rgba(204, 51, 51, 0.1);
    }

    .btn-delete:active {
      transform: scale(0.95);
    }

    /* Animation Utilities */
    .spinner-svg {
      animation: rotate 1s linear infinite;
    }

    .spinner-small {
      width: 13px;
      height: 13px;
      color: currentColor;
    }

    .spinner-medium {
      width: 24px;
      height: 24px;
      color: var(--accent);
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="app-container">
    <!-- Content Workspace -->
    <div class="dashboard-layout">
      <!-- Left column: Actions + Active downloads queue -->
      <aside class="sidebar">
        <!-- Input section -->
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Download Core</h2>
          </div>
          <form class="form-group" id="downloadForm">
            <textarea class="input-textarea" id="urls" placeholder="Paste SoundCloud URLs (one per line)..."></textarea>
            <button class="btn-download" id="downloadButton" type="submit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              <span>Download Tracks</span>
            </button>
            <div class="notice" id="notice"></div>
          </form>
        </section>

        <!-- Progress/Queue list section -->
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Active Monitor</h2>
            <div class="panel-badge" id="jobSummary">Queue Empty</div>
          </div>
          <div class="queue-list" id="progressList">
            <div class="empty-state">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              <span>Waiting for downloads...</span>
            </div>
          </div>
        </section>
      </aside>

      <!-- Right column: Music Library -->
      <section class="panel main-content">
        <div class="panel-header">
          <h2 class="panel-title">Track Library</h2>
          <div class="library-header-actions">
            <!-- Search engine wrapper -->
            <div class="search-input-wrapper">
              <span class="search-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input class="search-input" type="text" id="searchTracks" placeholder="Search track, artist, genre...">
            </div>
            <div class="panel-badge" id="trackSummary">0 tracks</div>
          </div>
        </div>

        <div class="tracks-container" id="tracks">
          <div class="empty-state">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M12 2a10 10 0 0 1 10 10"/>
            </svg>
            <span>No downloaded tracks found</span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const form = document.getElementById('downloadForm');
    const textarea = document.getElementById('urls');
    const button = document.getElementById('downloadButton');
    const notice = document.getElementById('notice');
    const jobSummary = document.getElementById('jobSummary');
    const trackSummary = document.getElementById('trackSummary');
    const progressList = document.getElementById('progressList');
    const tracksEl = document.getElementById('tracks');
    const searchInput = document.getElementById('searchTracks');
    
    const jobs = new Map();
    let allTracks = [];

    const statusRank = {
      downloading: 0,
      pending: 1,
      error: 2,
      done: 3,
      skipped: 4
    };

    function text(value) {
      return String(value || '');
    }

    function truncate(value) {
      const clean = text(value).replace(/\s+/g, ' ').trim();
      return clean.length > 120 ? `${clean.slice(0, 117)}...` : clean;
    }

    function formatSize(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) {
        return '';
      }
      const mb = value / 1024 / 1024;
      return `${mb.toFixed(mb >= 10 ? 1 : 2)} MB`;
    }

    function setNotice(message) {
      notice.textContent = message || '';
      notice.className = message ? 'notice active' : 'notice';
    }

    function getSummaryFromJobs() {
      const summary = {
        total: jobs.size,
        done: 0,
        error: 0,
        pending: 0,
        downloading: 0,
        skipped: 0
      };

      for (const job of jobs.values()) {
        if (Object.prototype.hasOwnProperty.call(summary, job.status)) {
          summary[job.status] += 1;
        }
      }

      return summary;
    }

    function updateJobSummary(summary) {
      const data = summary || getSummaryFromJobs();
      if (!data.total) {
        jobSummary.textContent = 'Queue Empty';
        return;
      }
      const completed = (data.done || 0) + (data.skipped || 0);
      jobSummary.textContent = `${completed}/${data.total} Complete`;
    }

    function statusLabel(job) {
      if (job.status === 'pending') return 'Waiting...';
      if (job.status === 'downloading') return 'Downloading...';
      if (job.status === 'done') return `✓ Success`;
      if (job.status === 'skipped') return `✓ Cached`;
      if (job.status === 'error') return `✕ Failed`;
      return text(job.status);
    }

    function renderJobs(summary) {
      progressList.textContent = '';

      const sortedJobs = Array.from(jobs.values()).sort((a, b) => {
        const rankDiff = (statusRank[a.status] ?? 9) - (statusRank[b.status] ?? 9);
        if (rankDiff !== 0) return rankDiff;
        return text(b.updatedAt).localeCompare(text(a.updatedAt));
      });

      if (!sortedJobs.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          <span>Waiting for downloads...</span>
        `;
        progressList.appendChild(empty);
        updateJobSummary(summary);
        return;
      }

      for (const job of sortedJobs) {
        const item = document.createElement('div');
        item.className = `queue-item ${job.status}`;

        const details = document.createElement('div');
        details.className = 'queue-details';

        const titleRow = document.createElement('div');
        titleRow.className = 'queue-title-row';

        if (job.status === 'downloading') {
          titleRow.innerHTML = `
            <svg class="spinner-svg spinner-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <circle cx="12" cy="12" r="10" stroke-opacity="0.1"></circle>
              <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path>
            </svg>
          `;
        }

        const titleText = document.createElement('span');
        titleText.className = 'queue-title';
        titleText.textContent = job.status === 'error' ? `${statusLabel(job)}: ${truncate(job.message)}` : (job.file ? job.file : statusLabel(job));
        titleRow.appendChild(titleText);

        const url = document.createElement('div');
        url.className = 'queue-url';
        url.textContent = job.url;

        details.append(titleRow, url);

        const statusTag = document.createElement('span');
        statusTag.className = 'queue-status-tag';
        statusTag.textContent = job.status;

        item.append(details, statusTag);
        progressList.appendChild(item);
      }

      updateJobSummary(summary);
    }

    function applyJob(job) {
      if (!job || !job.id) {
        return;
      }

      jobs.set(job.id, { ...(jobs.get(job.id) || {}), ...job });
    }

    async function loadJobs() {
      const response = await fetch('/jobs');
      const data = await response.json();
      jobs.clear();
      for (const job of data.jobs || []) {
        applyJob(job);
      }
      renderJobs(data.summary);
    }

    function renderTracks() {
      tracksEl.textContent = '';
      const query = searchInput.value.toLowerCase().trim();

      const filtered = allTracks.filter(track => {
        const title = (track.title || track.file || '').toLowerCase();
        const artist = (track.uploader || '').toLowerCase();
        const genre = (track.genre || '').toLowerCase();
        return title.includes(query) || artist.includes(query) || genre.includes(query);
      });

      trackSummary.textContent = query 
        ? `${filtered.length} of ${allTracks.length} tracks` 
        : `${allTracks.length} ${allTracks.length === 1 ? 'track' : 'tracks'}`;

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2a10 10 0 0 1 10 10"/>
          </svg>
          <span>${query ? 'No matching tracks found' : 'No downloaded tracks found'}</span>
        `;
        tracksEl.appendChild(empty);
        return;
      }

      for (const track of filtered) {
        const card = document.createElement('article');
        card.className = 'track-card';

        // Artwork Setup with Fallback SVG
        const artWrapper = document.createElement('div');
        artWrapper.className = 'track-art-wrapper';

        const placeholder = document.createElement('div');
        placeholder.className = 'track-art-placeholder';
        placeholder.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
        `;

        if (track.artwork) {
          const img = document.createElement('img');
          img.className = 'track-art';
          img.src = track.artwork;
          img.alt = '';
          img.onerror = () => {
            img.style.display = 'none';
            placeholder.style.display = 'flex';
          };
          artWrapper.appendChild(img);
          placeholder.style.display = 'none';
        }
        artWrapper.appendChild(placeholder);

        // Metadata elements
        const info = document.createElement('div');
        info.className = 'track-info';

        const title = document.createElement('div');
        title.className = 'track-title';
        title.textContent = track.title || track.file;

        const uploader = document.createElement('div');
        uploader.className = 'track-uploader';
        uploader.textContent = track.uploader || 'Unknown Artist';

        const metaRow = document.createElement('div');
        metaRow.className = 'track-meta-row';

        const durationText = track.durationText;
        const sizeText = formatSize(track.size);

        if (durationText) {
          const dur = document.createElement('span');
          dur.className = 'track-meta-item';
          dur.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>${durationText}</span>
          `;
          metaRow.appendChild(dur);
        }

        if (sizeText) {
          const sz = document.createElement('span');
          sz.className = 'track-meta-item';
          sz.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
              <line x1="7" y1="2" x2="7" y2="22"></line>
              <line x1="17" y1="2" x2="17" y2="22"></line>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <line x1="2" y1="7" x2="7" y2="7"></line>
              <line x1="2" y1="17" x2="7" y2="17"></line>
              <line x1="17" y1="17" x2="22" y2="17"></line>
              <line x1="17" y1="7" x2="22" y2="7"></line>
            </svg>
            <span>${sizeText}</span>
          `;
          metaRow.appendChild(sz);
        }

        if (track.genre) {
          const gen = document.createElement('span');
          gen.className = 'track-genre-pill';
          gen.textContent = track.genre;
          metaRow.appendChild(gen);
        }

        info.append(title, uploader, metaRow);

        // Delete button
        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.type = 'button';
        del.title = 'Delete track';
        del.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        `;
        del.addEventListener('click', async () => {
          if (confirm(`Delete "${track.title || track.file}" permanently?`)) {
            await fetch(`/tracks/${encodeURIComponent(track.file)}`, { method: 'DELETE' });
            await loadTracks();
          }
        });

        card.append(artWrapper, info, del);
        tracksEl.appendChild(card);
      }
    }

    async function loadTracks() {
      const response = await fetch('/tracks');
      const data = await response.json();
      allTracks = data.tracks || [];
      renderTracks();
    }

    // Connect Search Event Listener
    searchInput.addEventListener('input', renderTracks);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const urls = textarea.value.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!urls.length) {
        return;
      }

      button.disabled = true;
      setNotice('');

      try {
        const response = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls })
        });
        const data = await response.json();

        for (const job of data.jobs || []) {
          applyJob(job);
        }

        renderJobs();
        textarea.value = '';

        const parts = [];
        if (data.queued) parts.push(`${data.queued} queued`);
        if (data.skipped) parts.push(`${data.skipped} skipped`);
        if (data.duplicates) parts.push(`${data.duplicates} duplicate`);
        setNotice(parts.join(' · '));
      } finally {
        button.disabled = false;
      }
    });

    const events = new EventSource('/events');
    events.onmessage = (message) => {
      const event = JSON.parse(message.data);

      if (event.type === 'snapshot') {
        jobs.clear();
        for (const job of event.jobs || []) {
          applyJob(job);
        }
        renderJobs(event.summary);
        return;
      }

      if (event.jobId) {
        applyJob({
          id: event.jobId,
          url: event.url,
          normalizedUrl: event.normalizedUrl || '',
          status: event.status,
          message: event.message,
          file: event.file,
          updatedAt: new Date().toISOString()
        });
        renderJobs(event.summary);
      }

      if (event.status === 'done' || event.status === 'skipped') {
        loadTracks();
      }
    };

    loadJobs();
    loadTracks();
  </script>
</body>
</html>
