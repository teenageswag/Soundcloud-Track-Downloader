<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sound Downloader</title>
  <style>
    :root {
      --bg: #171717;
      --bg-el: #191919;
      --bg-hover: #1f1f1f;
      --bg-active: #252525;
      --bg-selected: #2a2510;
      --border: #262626;
      --border-var: #737373;
      --accent: #E0C952;
      --text: #CCCCCC;
      --text-muted: #999999;
      --text-dim: #737373;
      --success: #75BF40;
      --error: #CC3333;
      --scrollbar: #73737366;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      scrollbar-color: var(--scrollbar) transparent;
    }

    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.45;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 20px;
    }

    .title {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.35;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 20px;
      min-height: 0;
    }

    .column {
      display: grid;
      gap: 20px;
      min-height: 0;
    }

    .left {
      grid-template-rows: auto minmax(0, 1fr);
    }

    .right {
      grid-template-rows: minmax(0, 1fr);
    }

    .section {
      min-height: 0;
      background: var(--bg-el);
      border-radius: 10px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .caption {
      margin: 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
    }

    .summary {
      color: var(--text-dim);
      font-size: 13px;
      white-space: nowrap;
    }

    .form {
      display: grid;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 132px;
      max-height: 240px;
      resize: vertical;
      padding: 12px;
      background: var(--bg-el);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font: 400 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    textarea::placeholder {
      color: var(--text-dim);
    }

    textarea:focus,
    input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .primary {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #171717;
      font: 500 15px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    .primary:hover {
      filter: brightness(1.1);
    }

    .primary:disabled {
      cursor: default;
      filter: none;
      opacity: 0.7;
    }

    .notice {
      min-height: 18px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .notice.active {
      color: var(--accent);
    }

    .scroll {
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .progress-list {
      display: grid;
      gap: 8px;
    }

    .progress-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .progress-item:last-child {
      border-bottom: 0;
    }

    .progress-main {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .progress-text {
      min-width: 0;
    }

    .progress-title,
    .progress-url {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-title {
      color: var(--text);
      font-weight: 500;
    }

    .progress-url {
      margin-top: 2px;
      color: var(--text-dim);
    }

    .progress-state {
      color: var(--text-dim);
      white-space: nowrap;
    }

    .progress-item.downloading .progress-state,
    .progress-item.downloading .progress-title {
      color: var(--accent);
    }

    .progress-item.done .progress-state,
    .progress-item.done .progress-title,
    .progress-item.skipped .progress-state,
    .progress-item.skipped .progress-title {
      color: var(--success);
    }

    .progress-item.error .progress-state,
    .progress-item.error .progress-title {
      color: var(--error);
    }

    .spinner {
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid var(--bg-active);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tracks {
      display: grid;
      gap: 0;
    }

    .track {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 44px;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--bg-el);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: append 180ms ease-out;
    }

    .track:hover {
      background: var(--bg-hover);
      border-color: var(--border-var);
    }

    .track + .track {
      margin-top: 8px;
      position: relative;
    }

    .track + .track::before {
      content: "";
      position: absolute;
      left: 72px;
      right: 12px;
      top: -5px;
      height: 1px;
      background: var(--border);
    }

    @keyframes append {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .art {
      width: 48px;
      height: 48px;
      background: var(--bg-active);
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }

    .meta {
      min-width: 0;
    }

    .track-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-uploader {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-detail {
      margin-top: 3px;
      color: var(--text-dim);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete {
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: var(--error);
      cursor: pointer;
      opacity: 0.6;
      font: 400 18px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .delete:hover {
      opacity: 1;
    }

    .empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 4px 0;
    }

    @media (max-width: 820px) {
      .page {
        min-height: 100vh;
        padding: 16px;
        display: block;
      }

      .title {
        margin-bottom: 20px;
      }

      .layout,
      .column {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .section {
        margin-bottom: 0;
      }

      .progress-scroll,
      .tracks-scroll {
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Sound Downloader</h1>

    <div class="layout">
      <div class="column left">
        <section class="section">
          <div class="section-header">
            <p class="caption">Download</p>
          </div>
          <form class="form" id="downloadForm">
            <textarea id="urls" placeholder="Paste SoundCloud URLs, one per line"></textarea>
            <button class="primary" id="downloadButton" type="submit">↓ Download</button>
            <div class="notice" id="notice"></div>
          </form>
        </section>

        <section class="section">
          <div class="section-header">
            <p class="caption">Progress</p>
            <div class="summary" id="jobSummary">Downloaded 0 / 0</div>
          </div>
          <div class="scroll progress-scroll">
            <div class="progress-list" id="progressList">
              <div class="empty">Waiting…</div>
            </div>
          </div>
        </section>
      </div>

      <div class="column right">
        <section class="section">
          <div class="section-header">
            <p class="caption">Tracks</p>
            <div class="summary" id="trackSummary">0 tracks</div>
          </div>
          <div class="scroll tracks-scroll">
            <div class="tracks" id="tracks">
              <div class="empty">No downloaded tracks</div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('downloadForm');
    const textarea = document.getElementById('urls');
    const button = document.getElementById('downloadButton');
    const notice = document.getElementById('notice');
    const jobSummary = document.getElementById('jobSummary');
    const trackSummary = document.getElementById('trackSummary');
    const progressList = document.getElementById('progressList');
    const tracksEl = document.getElementById('tracks');
    const jobs = new Map();

    const statusRank = {
      downloading: 0,
      pending: 1,
      error: 2,
      done: 3,
      skipped: 4
    };

    function text(value) {
      return String(value || '');
    }

    function truncate(value) {
      const clean = text(value).replace(/\s+/g, ' ').trim();
      return clean.length > 120 ? `${clean.slice(0, 117)}...` : clean;
    }

    function formatSize(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) {
        return '';
      }

      const mb = value / 1024 / 1024;
      return `${mb.toFixed(mb >= 10 ? 1 : 2)} MB`;
    }

    function setNotice(message) {
      notice.textContent = message || '';
      notice.className = message ? 'notice active' : 'notice';
    }

    function getSummaryFromJobs() {
      const summary = {
        total: jobs.size,
        done: 0,
        error: 0,
        pending: 0,
        downloading: 0,
        skipped: 0
      };

      for (const job of jobs.values()) {
        if (Object.prototype.hasOwnProperty.call(summary, job.status)) {
          summary[job.status] += 1;
        }
      }

      return summary;
    }

    function updateJobSummary(summary) {
      const data = summary || getSummaryFromJobs();
      const completed = (data.done || 0) + (data.skipped || 0);
      const extra = [];
      if (data.downloading) extra.push(`${data.downloading} downloading`);
      if (data.pending) extra.push(`${data.pending} pending`);
      if (data.error) extra.push(`${data.error} error`);
      jobSummary.textContent = `Downloaded ${completed} / ${data.total || 0}${extra.length ? ` · ${extra.join(' · ')}` : ''}`;
    }

    function statusLabel(job) {
      if (job.status === 'pending') return 'Waiting…';
      if (job.status === 'downloading') return 'Downloading…';
      if (job.status === 'done') return `✓ ${text(job.file || job.message)}`;
      if (job.status === 'skipped') return `✓ ${text(job.file || job.message)}`;
      if (job.status === 'error') return `✕ ${truncate(job.message)}`;
      return text(job.message || job.status);
    }

    function renderJobs(summary) {
      progressList.textContent = '';

      const sortedJobs = Array.from(jobs.values()).sort((a, b) => {
        const rankDiff = (statusRank[a.status] ?? 9) - (statusRank[b.status] ?? 9);
        if (rankDiff !== 0) return rankDiff;
        return text(b.updatedAt).localeCompare(text(a.updatedAt));
      });

      if (!sortedJobs.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Waiting…';
        progressList.appendChild(empty);
        updateJobSummary(summary);
        return;
      }

      for (const job of sortedJobs) {
        const item = document.createElement('div');
        item.className = `progress-item ${job.status}`;

        const main = document.createElement('div');
        main.className = 'progress-main';

        if (job.status === 'downloading') {
          const spinner = document.createElement('span');
          spinner.className = 'spinner';
          main.appendChild(spinner);
        }

        const textWrap = document.createElement('div');
        textWrap.className = 'progress-text';

        const title = document.createElement('div');
        title.className = 'progress-title';
        title.textContent = statusLabel(job);

        const url = document.createElement('div');
        url.className = 'progress-url';
        url.textContent = job.url;

        const state = document.createElement('div');
        state.className = 'progress-state';
        state.textContent = job.status;

        textWrap.append(title, url);
        main.appendChild(textWrap);
        item.append(main, state);
        progressList.appendChild(item);
      }

      updateJobSummary(summary);
    }

    function applyJob(job) {
      if (!job || !job.id) {
        return;
      }

      jobs.set(job.id, { ...(jobs.get(job.id) || {}), ...job });
    }

    async function loadJobs() {
      const response = await fetch('/jobs');
      const data = await response.json();
      jobs.clear();
      for (const job of data.jobs || []) {
        applyJob(job);
      }
      renderJobs(data.summary);
    }

    async function loadTracks() {
      const response = await fetch('/tracks');
      const data = await response.json();
      tracksEl.textContent = '';

      const tracks = data.tracks || [];
      trackSummary.textContent = `${tracks.length} ${tracks.length === 1 ? 'track' : 'tracks'}`;

      if (tracks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No downloaded tracks';
        tracksEl.appendChild(empty);
        return;
      }

      for (const track of tracks) {
        const card = document.createElement('article');
        card.className = 'track';

        let art;
        if (track.artwork) {
          art = document.createElement('img');
          art.src = track.artwork;
          art.alt = '';
        } else {
          art = document.createElement('div');
        }
        art.className = 'art';

        const meta = document.createElement('div');
        meta.className = 'meta';

        const title = document.createElement('div');
        title.className = 'track-title';
        title.textContent = track.title || track.file;

        const uploader = document.createElement('div');
        uploader.className = 'track-uploader';
        uploader.textContent = track.uploader || 'Unknown uploader';

        const detail = document.createElement('div');
        detail.className = 'track-detail';
        const parts = [track.durationText, formatSize(track.size)].filter(Boolean);
        detail.textContent = parts.join(' · ');

        meta.append(title, uploader, detail);

        const del = document.createElement('button');
        del.className = 'delete';
        del.type = 'button';
        del.textContent = '✕';
        del.title = 'Delete';
        del.addEventListener('click', async () => {
          await fetch(`/tracks/${encodeURIComponent(track.file)}`, { method: 'DELETE' });
          await loadTracks();
        });

        card.append(art, meta, del);
        tracksEl.appendChild(card);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const urls = textarea.value.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!urls.length) {
        return;
      }

      button.disabled = true;
      setNotice('');

      try {
        const response = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls })
        });
        const data = await response.json();

        for (const job of data.jobs || []) {
          applyJob(job);
        }

        renderJobs();
        textarea.value = '';

        const parts = [];
        if (data.queued) parts.push(`${data.queued} queued`);
        if (data.skipped) parts.push(`${data.skipped} skipped`);
        if (data.duplicates) parts.push(`${data.duplicates} duplicate`);
        setNotice(parts.join(' · '));
      } finally {
        button.disabled = false;
      }
    });

    const events = new EventSource('/events');
    events.onmessage = (message) => {
      const event = JSON.parse(message.data);

      if (event.type === 'snapshot') {
        jobs.clear();
        for (const job of event.jobs || []) {
          applyJob(job);
        }
        renderJobs(event.summary);
        return;
      }

      if (event.jobId) {
        applyJob({
          id: event.jobId,
          url: event.url,
          normalizedUrl: event.normalizedUrl || '',
          status: event.status,
          message: event.message,
          file: event.file,
          updatedAt: new Date().toISOString()
        });
        renderJobs(event.summary);
      }

      if (event.status === 'done' || event.status === 'skipped') {
        loadTracks();
      }
    };

    loadJobs();
    loadTracks();
  </script>
</body>
</html>
